server:
  port: 60000

spring:
  application:
    name: user-service
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password:

logging:
  level:
    com.example.userservice.client: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"

token:
  expiration_time: ${TOKEN_EXPIRATION_TIME:86400000}
  secret: ${TOKEN_SECRET:user_service_test_jwt_secret_20250328_ok}

order-service:
  grpc:
    host: 127.0.0.1
    port: 9090
