server:
  port: 8081

spring:
  application:
    name: user-service
  jpa:
    hibernate:
      ddl-auto: update
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password:

logging:
  level:
    com.example.userservice.client: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

order-service:
  grpc:
    host: ${ORDER_SERVICE_GRPC_HOST:127.0.0.1}
    port: ${ORDER_SERVICE_GRPC_PORT:9090}

token:
  expiration_time: ${TOKEN_EXPIRATION_TIME:86400000}
  secret: ${TOKEN_SECRET:user_token_test_for_jwt_token_20250328}